name: Fragment & Cosm

on:
  schedule:
    # Every 4 hours (offset by 1h from engine scrapers to avoid commit conflicts)
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-assemble:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Fragment (scrape public data)
        run: node src/fragment/scrape.mjs

      - name: Run Cosm (assemble domes)
        run: node src/cosm/assemble.mjs

      - name: Count results
        id: counts
        run: |
          FRAGMENTS=$(find data/fragments -name '*.json' 2>/dev/null | wc -l)
          DOMES=$(find data/domes -name '*.json' 2>/dev/null | wc -l)
          echo "fragments=$FRAGMENTS" >> "$GITHUB_OUTPUT"
          echo "domes=$DOMES" >> "$GITHUB_OUTPUT"

      - name: Commit and push data
        run: |
          git config user.name "fragment-bot"
          git config user.email "fragment@baths.dev"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "fragment: ${{ steps.counts.outputs.fragments }} fragments, ${{ steps.counts.outputs.domes }} domes [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $i failed, retrying in $((i * 2))s..."
              sleep $((i * 2))
            done
          fi
