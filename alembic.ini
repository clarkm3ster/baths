# Alembic configuration for THE DOME
#
# The actual database URL is resolved at runtime from DOME_DATABASE_URL
# via dome.config.settings.  The value below is a fallback only.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Fallback URL — overridden by dome.config.settings in env.py
sqlalchemy.url = postgresql+asyncpg://dome:dome@localhost:5432/dome

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
